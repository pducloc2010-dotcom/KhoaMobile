<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KhoaMobile - Điện thoại, Phụ kiện chính hãng</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

.header{
    background:#d70018;
    color:white;
    padding:15px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    font-size:32px;
    font-weight:bold;
}

.search-box{
    width:50%;
}

.search-box input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
}

.menu{
    background:white;
    padding:12px;
    display:flex;
    justify-content:center;
    gap:25px;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.menu a{
    text-decoration:none;
    color:#333;
    font-weight:600;
}

.banner{
    margin:20px auto;
    max-width:1200px;
    height:350px;
    background:linear-gradient(135deg,#ff416c,#ff4b2b);
    border-radius:15px;
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
}

.banner h1{
    font-size:48px;
}

.banner p{
    margin-top:10px;
    font-size:20px;
}

.section{
    max-width:1200px;
    margin:30px auto;
}

.section-title{
    margin-bottom:20px;
    font-size:28px;
    color:#333;
}

.products{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
}

.product{
    background:white;
    border-radius:12px;
    padding:15px;
    text-align:center;
    transition:.3s;
}

.product:hover{
    transform:translateY(-5px);
    box-shadow:0 4px 15px rgba(0,0,0,.1);
}

.product img{
    width:100%;
    height:180px;
    object-fit:contain;
}

.product h3{
    margin:10px 0;
    font-size:18px;
}

.price{
    color:#d70018;
    font-size:22px;
    font-weight:bold;
}

.btn{
    display:inline-block;
    margin-top:10px;
    padding:10px 18px;
    background:#d70018;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

.footer{
    margin-top:50px;
    background:#222;
    color:white;
    padding:30px;
    text-align:center;
}
</style>

</head>

<body>
